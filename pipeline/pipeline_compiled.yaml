    exec-train-ranker:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_ranker
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas==2.2.2'\
          \ 'numpy==1.26.4' 'scikit-learn==1.5.0' 'xgboost==2.1.1'  &&  python3 -m\
          \ pip install --quiet --no-warn-script-location 'kfp==2.17.0' '--no-deps'\
          \ 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"$0\" \"$@\"\
          \n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_ranker(\n    features_csv: Input[Dataset],\n    model_out:\
          \ Output[Model],\n    metrics: Output[Metrics],\n    feature_cols: str,\n\
          \    categorical_cols: str,\n    label_col: str,\n    qid_col: str,\n  \
          \  model_name: str,\n    test_size: float = 0.2,\n    random_seed: int =\
          \ 42,\n):\n    \"\"\"Train an XGBoost rank:ndcg model, grouped by qid_col,\
          \ with a held-out group split.\"\"\"\n    import json\n    import numpy\
          \ as np\n    import pandas as pd\n    import xgboost as xgb\n    from sklearn.model_selection\
          \ import GroupShuffleSplit\n\n    df = pd.read_csv(features_csv.path).reset_index(drop=True)\n\
          \    feats = [c for c in feature_cols.split(\",\") if c]\n    cats = [c\
          \ for c in categorical_cols.split(\",\") if c]\n\n    X = pd.get_dummies(df[feats],\
          \ columns=cats, drop_first=False)\n    y = df[label_col].astype(int).to_numpy()\n\
          \    # XGBoost's qid must be numeric (it's packed as uint32 internally),\
          \ so encode the\n    # raw group keys (artist names / genre strings) to\
          \ integer codes.\n    groups = pd.factorize(df[qid_col].astype(str))[0]\n\
          \n    gss = GroupShuffleSplit(n_splits=1, test_size=test_size, random_state=random_seed)\n\
          \    train_idx, test_idx = next(gss.split(X, y, groups=groups))\n\n    def\
          \ sort_by_qid(idx):\n        order = np.argsort(groups[idx], kind=\"stable\"\
          )\n        return idx[order]\n\n    train_idx = sort_by_qid(train_idx)\n\
          \    test_idx = sort_by_qid(test_idx)\n\n    X_train, X_test = X.loc[train_idx],\
          \ X.loc[test_idx]\n    y_train, y_test = y[train_idx], y[test_idx]\n   \
          \ qid_train, qid_test = groups[train_idx], groups[test_idx]\n\n    model\
          \ = xgb.XGBRanker(\n        objective=\"rank:ndcg\",\n        eval_metric=[\"\
          ndcg@5\"],\n        n_estimators=80,\n        learning_rate=0.05,\n    \
          \    max_depth=3,\n        subsample=0.7,\n        colsample_bytree=0.7,\n\
          \        reg_lambda=5.0,\n        random_state=random_seed,\n    )\n   \
          \ model.fit(\n        X_train, y_train, qid=qid_train,\n        eval_set=[(X_train,\
          \ y_train), (X_test, y_test)],\n        eval_qid=[qid_train, qid_test],\n\
          \        verbose=False,\n    )\n\n    results = model.evals_result()\n \
          \   train_ndcg = results[\"validation_0\"][\"ndcg@5\"][-1]\n    test_ndcg\
          \ = results[\"validation_1\"][\"ndcg@5\"][-1]\n\n    model.get_booster().save_model(model_out.path\
          \ + \".json\")\n    with open(model_out.path + \".columns.json\", \"w\"\
          ) as f:\n        json.dump({\"columns\": list(X.columns), \"feature_cols\"\
          : feats, \"categorical_cols\": cats}, f)\n\n    metrics.log_metric(\"train_ndcg_at_5\"\
          , float(train_ndcg))\n    metrics.log_metric(\"test_ndcg_at_5\", float(test_ndcg))\n\
          \    metrics.log_metric(\"n_train\", float(len(X_train)))\n    metrics.log_metric(\"\
          n_test\", float(len(X_test)))\n    metrics.log_metric(\"n_groups\", float(pd.Series(groups).nunique()))\n\
          \n    importances = model.feature_importances_\n    for i in np.argsort(importances)[::-1][:5]:\n\
          \        metrics.log_metric(f\"top_feature__{X.columns[i]}\", float(importances[i]))\n\
          \n"

pipelineInfo:
  description: Rank artists and ad creatives for automated user-acquisition campaigns
    using XGBoost learning-to-rank.
  name: content-marketing-ranking-pipeline
root:
  dag:
    tasks:
      build-artist-features:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-build-artist-features
        dependentTasks:
        - download-spotify-data
        inputs:
          artifacts:
            tracks_csv:
              taskOutputArtifact:
                outputArtifactKey: tracks_csv
                producerTask: download-spotify-data
          parameters:
            min_tracks:
              componentInputParameter: min_tracks_per_artist
            random_seed:
              componentInputParameter: random_seed
        taskInfo:
          name: build-artist-features
      download-spotify-data:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-download-spotify-data
        inputs:
          parameters:
            data_url:
              componentInputParameter: data_url
        taskInfo:
          name: download-spotify-data
      generate-ad-creatives:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-generate-ad-creatives
        dependentTasks:
        - build-artist-features
        inputs:
          artifacts:
            artist_features_csv:
              taskOutputArtifact:
                outputArtifactKey: artist_features_csv
                producerTask: build-artist-features
          parameters:
            creatives_per_artist:
              componentInputParameter: creatives_per_artist
            random_seed:
              componentInputParameter: random_seed
            top_n_per_genre:
              componentInputParameter: top_n_per_genre
        taskInfo:
          name: generate-ad-creatives
      generate-campaign-recommendations:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-generate-campaign-recommendations
        dependentTasks:
        - build-artist-features
        - generate-ad-creatives
        - train-ranker
        - train-ranker-2
        inputs:
          artifacts:
            artist_features_csv:
              taskOutputArtifact:
                outputArtifactKey: artist_features_csv
                producerTask: build-artist-features
            artist_model:
              taskOutputArtifact:
                outputArtifactKey: model_out
                producerTask: train-ranker
            creative_model:
              taskOutputArtifact:
                outputArtifactKey: model_out
                producerTask: train-ranker-2
            creatives_csv:
              taskOutputArtifact:
                outputArtifactKey: creatives_csv
                producerTask: generate-ad-creatives
          parameters:
            artist_categorical_cols:
              runtimeValue:
                constant: dominant_genre
            artist_feature_cols:
              runtimeValue:
                constant: n_tracks,n_albums,playlist_reach,n_genres,n_subgenres,avg_popularity,max_popularity,std_popularity,recency_score,avg_danceability,avg_energy,avg_loudness,avg_speechiness,avg_acousticness,avg_instrumentalness,avg_liveness,avg_valence,avg_tempo,dominant_genre
            creative_categorical_cols:
              runtimeValue:
                constant: dominant_genre,creative_format,hook_type,cta_type,visual_style,placement
            creative_feature_cols:
              runtimeValue:
                constant: avg_popularity,playlist_reach,avg_danceability,avg_energy,avg_valence,dominant_genre,creative_format,hook_type,cta_type,visual_style,placement
            top_k_artists:
              componentInputParameter: top_k_artists
        taskInfo:
          name: generate-campaign-recommendations
      train-ranker:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-ranker
        dependentTasks:
        - build-artist-features
        inputs:
          artifacts:
            features_csv:
              taskOutputArtifact:
                outputArtifactKey: artist_features_csv
                producerTask: build-artist-features
          parameters:
            categorical_cols:
              runtimeValue:
                constant: dominant_genre
            feature_cols:
              runtimeValue:
                constant: n_tracks,n_albums,playlist_reach,n_genres,n_subgenres,avg_popularity,max_popularity,std_popularity,recency_score,avg_danceability,avg_energy,avg_loudness,avg_speechiness,avg_acousticness,avg_instrumentalness,avg_liveness,avg_valence,avg_tempo,dominant_genre
            label_col:
              runtimeValue:
                constant: relevance_grade
            model_name:
              runtimeValue:
                constant: artist_ranker
            qid_col:
              runtimeValue:
                constant: dominant_genre
            random_seed:
              componentInputParameter: random_seed
        taskInfo:
          name: train-artist-ranker
      train-ranker-2:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-ranker-2
        dependentTasks:
        - generate-ad-creatives
        inputs:
          artifacts:
            features_csv:
              taskOutputArtifact:
                outputArtifactKey: creatives_csv
                producerTask: generate-ad-creatives
          parameters:
            categorical_cols:
              runtimeValue:
                constant: dominant_genre,creative_format,hook_type,cta_type,visual_style,placement
            feature_cols:
              runtimeValue:
                constant: avg_popularity,playlist_reach,avg_danceability,avg_energy,avg_valence,dominant_genre,creative_format,hook_type,cta_type,visual_style,placement
            label_col:
              runtimeValue:
                constant: relevance_grade
            model_name:
              runtimeValue:
                constant: creative_ranker
            qid_col:
              runtimeValue:
                constant: artist_id
            random_seed:
              componentInputParameter: random_seed
        taskInfo:
          name: train-creative-ranker
  inputDefinitions:
    parameters:
      creatives_per_artist:
        defaultValue: 8.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      data_url:
        defaultValue: https://raw.githubusercontent.com/rfordatascience/tidytuesday/master/data/2020/2020-01-21/spotify_songs.csv
        isOptional: true
        parameterType: STRING
      min_tracks_per_artist:
        defaultValue: 2.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      random_seed:
        defaultValue: 42.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      top_k_artists:
        defaultValue: 25.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      top_n_per_genre:
        defaultValue: 80.0
        isOptional: true
        parameterType: NUMBER_INTEGER
schemaVersion: 2.1.0
sdkVersion: kfp-2.17.0
